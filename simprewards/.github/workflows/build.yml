name: Build SimpRewards Plugin

on:
  # 触发条件：推送代码到 main 分支时自动构建
  push:
    branches: [main]
  # 手动触发（可选）
  workflow_dispatch:

jobs:
  build:
    name: Compile & Package Plugin
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（必须第一步）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境（Minecraft 插件推荐 Java 17）
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'  # 自动缓存 Maven 依赖，加快后续构建

      # 3. 验证 pom.xml 是否存在（防止误操作）
      - name: Verify project structure
        run: |
          ls -la
          test -f pom.xml && echo "✅ pom.xml found" || { echo "❌ pom.xml not found!"; exit 1; }

      # 4. 构建插件（跳过测试，快速打包）
      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      # 5. 检查是否生成了 JAR 文件
      - name: Verify JAR output
        run: |
          ls -la target/
          if ls target/*.jar >/dev/null 2>&1; then
            echo "✅ JAR file generated"
          else
            echo "❌ No JAR file found in target/"
            exit 1
          fi

      # 6. 上传构建产物（JAR 文件）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpRewards-plugin
          path: target/*.jar
          retention-days: 30  # 保留30天，方便下载

      # 7. 【可选】自动创建 Release（仅当推送到 main 分支时）
      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: target/*.jar
          tag_name: v1.0.${{ github.run_number }}
          name: SimpRewards v1.0.${{ github.run_number }}
          body: |
            🎉 自动构建完成！  
            - 构建编号: ${{ github.run_number }}
            - 提交: ${{ github.sha }}
            - 分支: ${{ github.ref }}

            ⚙️ 构建环境：
            - Java: 17
            - Maven: latest
            - OS: Ubuntu latest

            📦 插件版本：SimpRewards 1.0.x  
            支持 SQLite/MySQL，兼容 Folia！

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8. 【可选】发送通知（如需集成 Discord/Slack 可添加）
